<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OG Generation - Malachite</title>
    <style>
      :root {
        --bg: #040b07;
        --panel: #0b1612;
        --border: rgba(43, 194, 107, 0.35);
        --text: #e7f7ef;
        --muted: #8db5a0;
        --accent: #2bc26b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", "Avenir Next", sans-serif;
        background:
          radial-gradient(1000px 500px at 15% 20%, rgba(43, 194, 107, 0.18), transparent 60%),
          radial-gradient(900px 500px at 85% 85%, rgba(15, 126, 75, 0.2), transparent 60%),
          var(--bg);
        color: var(--text);
      }

      .wrap {
        max-width: 1280px;
        margin: 0 auto;
        padding: 32px 20px 40px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(28px, 4vw, 52px);
        letter-spacing: 0.01em;
      }

      .sub {
        margin: 0 0 18px;
        color: var(--muted);
        font-size: 16px;
      }

      .panel {
        border: 1px solid var(--border);
        background: rgba(11, 22, 18, 0.75);
        border-radius: 18px;
        padding: 14px;
        box-shadow: 0 24px 70px rgba(43, 194, 107, 0.18);
      }

      .preview {
        width: 100%;
        aspect-ratio: 1200 / 630;
        border-radius: 12px;
        border: 1px solid rgba(43, 194, 107, 0.3);
        overflow: hidden;
        background: #020603;
      }

      .preview img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
      }

      .actions {
        margin-top: 18px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      button {
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 10px 16px;
        color: var(--text);
        background: #102219;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
      }

      button:hover {
        background: #163022;
      }

      button:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }

      .meta {
        color: var(--muted);
        font-size: 14px;
      }

      .err {
        margin-top: 10px;
        color: #ff8fa5;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>Malachite OG Generation</h1>
      <p class="sub">预览 1200x630 的 OG SVG，并下载为 SVG 或 PNG。网址已更新为 https://malachite.orangely.xyz</p>

      <section class="panel">
        <div class="preview">
          <img id="ogPreview" alt="Malachite OG SVG Preview" width="1200" height="630" />
        </div>

        <div class="actions">
          <button id="downloadSvgBtn" type="button">下载 SVG</button>
          <button id="downloadPngBtn" type="button">下载 PNG</button>
          <span class="meta">尺寸: 1200 × 630</span>
        </div>

        <div id="errorText" class="err" hidden></div>
      </section>
    </main>

    <script>
      const OG_WIDTH = 1200;
      const OG_HEIGHT = 630;
      const OG_PATH_CANDIDATES = [
        "/og-malachite.svg",
        "./og-malachite.svg",
        "og-malachite.svg",
        "./public/og-malachite.svg",
        "public/og-malachite.svg"
      ];

      const downloadSvgBtn = document.getElementById("downloadSvgBtn");
      const downloadPngBtn = document.getElementById("downloadPngBtn");
      const errorText = document.getElementById("errorText");
      const ogPreview = document.getElementById("ogPreview");
      let resolvedSvgPath = null;

      function showError(message) {
        errorText.textContent = message;
        errorText.hidden = false;
      }

      function clearError() {
        errorText.hidden = true;
        errorText.textContent = "";
      }

      function triggerDownload(url, filename) {
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        a.click();
      }

      function loadImage(url) {
        return new Promise((resolve, reject) => {
          ogPreview.onload = () => resolve();
          ogPreview.onerror = () => reject(new Error("load error"));
          ogPreview.src = url;
        });
      }

      async function resolveSvgPath() {
        for (const candidate of OG_PATH_CANDIDATES) {
          try {
            await loadImage(candidate);
            resolvedSvgPath = candidate;
            return;
          } catch (error) {
            continue;
          }
        }
        throw new Error("预览加载失败。请确认 og-malachite.svg 可访问。");
      }

      async function exportPngFromPreview() {
        if (!ogPreview.complete || ogPreview.naturalWidth === 0) {
          throw new Error("PNG 导出失败：SVG 预览未加载。");
        }

        const canvas = document.createElement("canvas");
        canvas.width = OG_WIDTH;
        canvas.height = OG_HEIGHT;
        const ctx = canvas.getContext("2d");
        if (!ctx) {
          throw new Error("浏览器不支持 canvas。");
        }
        ctx.drawImage(ogPreview, 0, 0, OG_WIDTH, OG_HEIGHT);

        const pngBlob = await new Promise((resolve) => canvas.toBlob(resolve, "image/png"));
        if (!pngBlob) {
          throw new Error("PNG 导出失败。");
        }

        const pngUrl = URL.createObjectURL(pngBlob);
        triggerDownload(pngUrl, "malachite-og-1200x630.png");
        setTimeout(() => URL.revokeObjectURL(pngUrl), 1000);
      }

      async function init() {
        downloadSvgBtn.disabled = true;
        downloadPngBtn.disabled = true;
        try {
          clearError();
          await resolveSvgPath();
          downloadSvgBtn.disabled = false;
          downloadPngBtn.disabled = false;
        } catch (error) {
          showError(error instanceof Error ? error.message : "初始化失败。");
        }
      }

      downloadSvgBtn.addEventListener("click", async () => {
        clearError();
        try {
          if (!resolvedSvgPath) {
            throw new Error("SVG 路径未就绪。");
          }
          triggerDownload(resolvedSvgPath, "malachite-og-1200x630.svg");
        } catch (error) {
          showError(error instanceof Error ? error.message : "下载 SVG 失败。");
        }
      });

      downloadPngBtn.addEventListener("click", async () => {
        clearError();
        downloadPngBtn.disabled = true;
        downloadPngBtn.textContent = "正在导出 PNG...";
        try {
          await exportPngFromPreview();
        } catch (error) {
          showError(error instanceof Error ? error.message : "下载 PNG 失败。");
        } finally {
          downloadPngBtn.disabled = !resolvedSvgPath;
          downloadPngBtn.textContent = "下载 PNG";
        }
      });

      init();
    </script>
  </body>
</html>
